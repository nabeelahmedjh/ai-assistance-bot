services:
  db:
    image: pgvector/pgvector:pg16
    container_name: ai-assistance-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_assistance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_assistance"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: ai-assistance-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_DB: ai_assistance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate &&
      daphne -b 0.0.0.0 -p 8000 config.asgi:application"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-assistance-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
      NEXT_PUBLIC_DEFAULT_LEAD_ID: lead-demo-1
      HOSTNAME: 0.0.0.0
      PORT: 3000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
