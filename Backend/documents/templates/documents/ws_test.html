<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WebSocket Chat Test</title>
  <style>
    :root {
      --bg: #f3f5f7;
      --panel: #ffffff;
      --text: #1b2430;
      --muted: #5b6777;
      --line: #d9dee6;
      --accent: #0f766e;
      --accent-dark: #0b5e58;
      --error: #b42318;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #eef4f6 0%, #f8f9fb 65%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
    }

    .card {
      width: min(860px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 20px 45px rgba(16, 24, 40, 0.08);
      overflow: hidden;
    }

    .header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfd;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .title {
      font-size: 16px;
      margin: 0;
      letter-spacing: 0.2px;
    }

    .status {
      color: var(--muted);
      font-size: 13px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .row.message {
      grid-template-columns: 1fr auto;
    }

    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font: inherit;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font: inherit;
      color: #fff;
      background: var(--accent);
      cursor: pointer;
    }

    button:hover { background: var(--accent-dark); }

    #log {
      height: 420px;
      overflow: auto;
      padding: 12px 16px;
      background: #f9fbfc;
      font-family: "IBM Plex Mono", "Consolas", monospace;
      font-size: 13px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .line {
      margin-bottom: 8px;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #e8edf3;
      background: #fff;
    }

    .line.error {
      border-color: #f1d0cc;
      color: var(--error);
      background: #fff6f5;
    }
  </style>
</head>
<body>
  <main class="card">
    <section class="header">
      <h1 class="title">WebSocket Chat Test</h1>
      <span id="status" class="status">Disconnected</span>
    </section>

    <section class="row">
      <input id="leadId" type="text" value="lead-demo-1" placeholder="lead id" />
      <button id="connectBtn" type="button">Connect</button>
      <button id="disconnectBtn" type="button">Disconnect</button>
    </section>

    <section class="row message">
      <input id="messageInput" type="text" placeholder="Type a message and press Send" />
      <button id="sendBtn" type="button">Send</button>
    </section>

    <section id="log" aria-live="polite"></section>
  </main>

  <script>
    let socket = null;
    let typingTimer = null;

    const statusEl = document.getElementById("status");
    const leadIdEl = document.getElementById("leadId");
    const messageEl = document.getElementById("messageInput");
    const logEl = document.getElementById("log");

    function sanitizeLeadId(value) {
      return (value || "").trim().replace(/[^a-zA-Z0-9_-]/g, "");
    }

    function appendLog(label, payload, isError) {
      const line = document.createElement("div");
      line.className = isError ? "line error" : "line";
      line.textContent = `[${new Date().toLocaleTimeString()}] ${label}: ${typeof payload === "string" ? payload : JSON.stringify(payload)}`;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function connectSocket() {
      const leadId = sanitizeLeadId(leadIdEl.value);
      if (!leadId) {
        appendLog("Client", "Lead ID is required", true);
        return;
      }

      if (socket && socket.readyState === WebSocket.OPEN) {
        appendLog("Client", "Already connected");
        return;
      }

      const scheme = window.location.protocol === "https:" ? "wss" : "ws";
      const url = `${scheme}://${window.location.host}/ws/chat/${leadId}/`;

      socket = new WebSocket(url);
      setStatus(`Connecting: ${url}`);

      socket.onopen = () => {
        setStatus(`Connected as ${leadId}`);
        appendLog("Client", "WebSocket opened");
      };

      socket.onclose = () => {
        setStatus("Disconnected");
        appendLog("Client", "WebSocket closed");
      };

      socket.onerror = () => {
        appendLog("Client", "WebSocket error", true);
      };

      socket.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          appendLog("Server", data);
        } catch (err) {
          appendLog("Server", event.data);
        }
      };
    }

    function disconnectSocket() {
      if (!socket) {
        return;
      }
      socket.close();
    }

    function sendMessage() {
      if (!socket || socket.readyState !== WebSocket.OPEN) {
        appendLog("Client", "Connect first", true);
        return;
      }

      const message = messageEl.value.trim();
      if (!message) {
        return;
      }

      const payload = { type: "message", message };
      socket.send(JSON.stringify(payload));
      appendLog("Client", payload);
      messageEl.value = "";
    }

    function sendTyping(isTyping) {
      if (!socket || socket.readyState !== WebSocket.OPEN) {
        return;
      }

      const payload = { type: "typing", is_typing: isTyping };
      socket.send(JSON.stringify(payload));
    }

    messageEl.addEventListener("input", () => {
      sendTyping(true);
      clearTimeout(typingTimer);
      typingTimer = setTimeout(() => sendTyping(false), 700);
    });

    document.getElementById("connectBtn").addEventListener("click", connectSocket);
    document.getElementById("disconnectBtn").addEventListener("click", disconnectSocket);
    document.getElementById("sendBtn").addEventListener("click", sendMessage);

    messageEl.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        sendMessage();
      }
    });
  </script>
</body>
</html>
